upstream backend {
    server backend:3000;
}

upstream frontend {
    server frontend:80;
}

# HTTP — serve ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — replace shahgrid.publicvm.com with your actual domain (e.g. shahgrid.duckdns.org)
server {
    listen 443 ssl;
    server_name shahgrid.publicvm.com;

    ssl_certificate     /etc/letsencrypt/live/shahgrid.publicvm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shahgrid.publicvm.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
