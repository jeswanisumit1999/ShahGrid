services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shahgrid}
      POSTGRES_USER: ${POSTGRES_USER:-shahgrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shahgrid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node / Express) ─────────────────────────────────────────────────
  backend:
    image: sumitjeswani/shahgrid-backend:latest
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shahgrid}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shahgrid}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"

  # ── Frontend (Flutter Web — served by nginx) ─────────────────────────────────
  frontend:
    image: sumitjeswani/shahgrid-frontend:latest
    build:
      context: ./Frontend/shah_grid
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost/api/v1}
    restart: unless-stopped
    expose:
      - "80"

  # ── Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine

    restart: unless-stopped

    depends_on:
      - backend
      - frontend

    environment:
      DOMAIN: ${DOMAIN}

    ports:
      - "80:80"
      - "443:443"

    volumes:

      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt


  # ── SSL Renewal ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest

    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

    entrypoint: >
      /bin/sh -c '
      while true;
      do
        certbot renew;
        sleep 12h;
      done
      '
volumes:
  postgres_data:
  certbot_www:
  certbot_certs:

networks:
  default:
    name: shahgrid_network