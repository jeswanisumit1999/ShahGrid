services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shahgrid}
      POSTGRES_USER: ${POSTGRES_USER:-shahgrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shahgrid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node / Express) ─────────────────────────────────────────────────
  backend:
    image: sumitjeswani/shahgrid-backend:latest
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shahgrid}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shahgrid}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"

  # ── Frontend (Flutter Web — served by nginx) ─────────────────────────────────
  frontend:
    image: sumitjeswani/shahgrid-frontend:latest
    build:
      context: ./Frontend/shah_grid
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost/api/v1}
    restart: unless-stopped
    expose:
      - "80"

  # ── Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine

    restart: unless-stopped

    depends_on:
      - backend
      - frontend

    environment:
      DOMAIN: ${DOMAIN}

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx:/etc/nginx/templates_custom:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

    command: |
      /bin/sh -c "
        if [ ! -f /etc/letsencrypt/live/$${DOMAIN}/fullchain.pem ]; then
          echo 'No SSL cert found for $${DOMAIN}. Using http-only config.'
          envsubst '$$DOMAIN' < /etc/nginx/templates_custom/http-only.conf.template > /etc/nginx/conf.d/default.conf
          nginx -g 'daemon off;' &
          NGINX_PID=\$$!
          
          while [ ! -f /etc/letsencrypt/live/$${DOMAIN}/fullchain.pem ]; do
            sleep 2
          done
          
          echo 'SSL cert generated. Switching to HTTPS config.'
          envsubst '$$DOMAIN' < /etc/nginx/templates_custom/default.conf.template > /etc/nginx/conf.d/default.conf
          kill -QUIT \$$NGINX_PID
          wait \$$NGINX_PID
          exec nginx -g 'daemon off;'
        else
          echo 'SSL cert found for $${DOMAIN}. Using HTTPS config.'
          envsubst '$$DOMAIN' < /etc/nginx/templates_custom/default.conf.template > /etc/nginx/conf.d/default.conf
          exec nginx -g 'daemon off;'
        fi
      "

  # ── SSL Renewal ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    environment:
      DOMAIN: ${DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

    entrypoint: |
      /bin/sh -c '
        sleep 5
        while [ ! -f "/etc/letsencrypt/live/$${DOMAIN}/fullchain.pem" ]; do
          echo "Obtaining initial certificate for $${DOMAIN}..."
          certbot certonly --webroot -w /var/www/certbot \
            -d $${DOMAIN} \
            --email $${CERTBOT_EMAIL} \
            --rsa-key-size 4096 \
            --agree-tos \
            --no-eff-email \
            --non-interactive || true

          if [ -f "/etc/letsencrypt/live/$${DOMAIN}/fullchain.pem" ]; then
            break
          fi
          echo "Certbot failed. Retrying in 60s..."
          sleep 60
        done
        while true; do
          certbot renew
          sleep 12h
        done
      '
volumes:
  postgres_data:
  certbot_www:
  certbot_certs:

networks:
  default:
    name: shahgrid_network