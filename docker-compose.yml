services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shahgrid}
      POSTGRES_USER: ${POSTGRES_USER:-shahgrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shahgrid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node / Express) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shahgrid}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shahgrid}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"

  # ── Frontend (Flutter Web — served by nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./Frontend/shah_grid
      dockerfile: Dockerfile
      args:
        # /api/v1 is a relative URL — nginx on the same host routes it to backend
        API_BASE_URL: /api/v1
    restart: unless-stopped
    expose:
      - "80"

  # ── Nginx (reverse proxy: /api/ → backend, / → frontend) ────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
