version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shahgrid_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shahgrid
    ports:
      - '5432:5432'
    volumes:
      - shahgrid_postgres_data:/var/lib/postgresql/data

volumes:
  shahgrid_postgres_data:
