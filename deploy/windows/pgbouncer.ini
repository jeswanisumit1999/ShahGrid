; ShahGrid — pgBouncer config (Windows, native)
; Run via NSSM service "shahgrid-pgbouncer":
;   E:\apps\PgBouncer\bin\pgbouncer.exe E:\apps\shahgrid\shared\pgbouncer.ini
;
; App connects to pgBouncer on 127.0.0.1:6432 (pooled).
; pgBouncer connects to Postgres on 127.0.0.1:5432.
; Both are localhost-only — nothing DB-related is exposed off the box.

[databases]
shahgrid = host=127.0.0.1 port=5432 dbname=shahgrid

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

; Client auth. userlist.txt holds "shahgrid" with its password (plaintext is
; valid here; pgBouncer derives SCRAM from it). Keep the file localhost-only and
; NTFS-restricted (setup.ps1 ACLs it).
auth_type = scram-sha-256
auth_file = E:\apps\shahgrid\shared\userlist.txt

; Transaction pooling — required for a serverless-style Node/Prisma app.
; The app MUST append ?pgbouncer=true to DATABASE_URL (disables prepared stmts).
pool_mode = transaction

; Prisma sends these startup params; pgBouncer must not reject them.
ignore_startup_parameters = extra_float_digits,options

max_client_conn = 200
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3

; Admin/stats console (psql -h 127.0.0.1 -p 6432 pgbouncer)
admin_users = postgres
stats_users = postgres

logfile = E:\apps\shahgrid\logs\pgbouncer.log
pidfile = E:\apps\shahgrid\state\pgbouncer.pid
